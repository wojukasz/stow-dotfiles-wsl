# vim: set foldmethod=marker:                                  # Use marker folds when editing this file in Vim.

# Plugins # {{{
set -g @plugin 'tmux-plugins/tpm'                             # TPM plugin manager.
set -g @plugin 'mshkrebtan/base16-tmux'                       # Base16 theme support.
set -g @plugin 'tmux-plugins/tmux-pain-control'               # Pane movement/resizing helpers.
set -g @plugin 'tmux-plugins/tmux-sessionist'                 # Session/window helpers.
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'           # Status indicator for prefix/copy-mode.
# }}}

# Plugin settings # {{{
set -g @shell_mode 'vi'                                       # Ask supported plugins to use vi-style shell/editing behaviour.
set -g @prefix_highlight_show_copy_mode 'on'                  # Show the prefix-highlight indicator in copy-mode.
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold' # Make the copy-mode indicator obvious.
# }}}

# TPM bootstrap # {{{
run '~/.tmux/plugins/tpm/tpm'                                 # Load TPM and initialise plugins.
# }}}

# Core behaviour # {{{
set -g prefix C-a                                             # Use Ctrl-a as the tmux prefix.
unbind C-b                                                    # Remove the default Ctrl-b prefix binding.
bind-key C-a last-window                                      # Prefix + Ctrl-a switches to the previous window.
bind-key a send-prefix                                        # Prefix + a sends Ctrl-a through to the app inside the pane.

set -g default-shell "${SHELL}"                               # Start new panes with your current shell.
set -g base-index 1                                           # Number windows from 1.
setw -g pane-base-index 1                                     # Number panes from 1.
set -s escape-time 0                                          # Remove the Esc timeout; improves Vim responsiveness on fast links.
set -g history-limit 100000                                   # Keep a large per-pane scrollback buffer.
set -g set-clipboard off                                      # Do not rely on tmux's direct clipboard integration.
set -g focus-events on                                        # Pass terminal focus events to programs that support them.
set -g allow-passthrough on                                   # Allow passthrough escape sequences for terminals/apps that use them.

set -g mouse on                                               # Enable modern tmux mouse handling.
set -g focus-follows-mouse off                                # Moving the mouse alone does not change the active pane.
# }}}

# Copy-mode # {{{
setw -g mode-keys vi                                          # Use vi keys in copy-mode.
bind-key -T copy-mode-vi v send -X begin-selection            # Press v in copy-mode to start a selection.
bind-key -T copy-mode-vi Escape send -X cancel                # Press Esc in copy-mode to cancel.
# }}}

# Mouse toggles # {{{
bind-key m set -g mouse on \; display-message 'Mouse: ON'     # Prefix + m enables tmux mouse handling.
bind-key M set -g mouse off \; display-message 'Mouse: OFF'   # Prefix + M disables tmux mouse handling.
# }}}

# Session chooser # {{{
bind-key Space choose-session                                 # Prefix + Space opens the session chooser.
# }}}

# Pane navigation # {{{
bind-key h select-pane -L                                     # Prefix + h moves to the pane on the left.
bind-key j select-pane -D                                     # Prefix + j moves to the pane below.
bind-key k select-pane -U                                     # Prefix + k moves to the pane above.
bind-key l select-pane -R                                     # Prefix + l moves to the pane on the right.

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'" # Detect whether the current pane is running Vim/Neovim.

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L' # Ctrl-h goes to Vim split left, otherwise tmux pane left.
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D' # Ctrl-j goes to Vim split down, otherwise tmux pane down.
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U' # Ctrl-k goes to Vim split up, otherwise tmux pane up.
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R' # Ctrl-l goes to Vim split right, otherwise tmux pane right.

bind-key -n M-Left  select-pane -L                            # Alt-Left moves to the pane on the left without prefix.
bind-key -n M-Right select-pane -R                            # Alt-Right moves to the pane on the right without prefix.
bind-key -n M-Up    select-pane -U                            # Alt-Up moves to the pane above without prefix.
bind-key -n M-Down  select-pane -D                            # Alt-Down moves to the pane below without prefix.
# }}}

# Clipboard bindings # {{{
if-shell '[ -n "$WAYLAND_DISPLAY" ]' {
    bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy" # On Wayland, y copies the selection with wl-copy.
}

if-shell 'uname | grep -q Darwin' {
    bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"  # On macOS, y copies the selection with pbcopy.
}

if-shell '[ -z "$WAYLAND_DISPLAY" ] && ! uname | grep -q Darwin' {
    bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard" # On Linux/X11, y copies the selection with xclip.
}
# }}}

# Titles # {{{
setw -g automatic-rename on                                   # Let tmux rename windows from the active command.
set -g set-titles on                                          # Update the outer terminal title.
set -g set-titles-string '[#S:#I #h] #W'                      # Terminal title format: session, window index, host, window name.
# }}}

# Activity notifications # {{{
setw -g monitor-activity on                                   # Mark windows with new activity.
set -g visual-activity off                                    # Do not flash the client for activity events.
# }}}

# Terminal and colour support # {{{
set -g default-terminal "tmux-256color"                       # Use tmux's own modern terminfo entry inside tmux.
set -as terminal-features ',xterm-256color:RGB'               # Tell tmux that an outer xterm-256color terminal supports RGB colour.
# }}}

# Status line # {{{
set -g status on                                              # Enable the status line.
set -g status-justify left                                    # Left-align the window list.
set -g status-left-length 100                                 # Allow a reasonably wide left status segment.
set -g status-right-length 100                                # Allow a reasonably wide right status segment.
set -g status-style 'fg=white,bg=colour8'                     # Set the overall status line colours.
setw -g window-status-separator ''                            # Remove the separator between window entries.

set -g status-left '#{prefix_highlight} #[bold]#S '           # Left status: prefix/copy-mode indicator plus session name.
set -g status-right '%Y-%m-%d | %H:%M | #h '                  # Right status: date, time, and host.
setw -g window-status-format ' #I#F #W '                      # Format for inactive windows.
setw -g window-status-current-format '#[reverse] #I#F #W #[default]' # Format for the active window.
# }}}

# Reload config # {{{
bind-key r source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf' # Prefix + r reloads this file.
# }}}

