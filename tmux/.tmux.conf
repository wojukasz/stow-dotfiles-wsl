# vim: set foldmethod=marker:                                  # Tell Vim to use marker-based folding for this file.

# Plugins # {{{
set -g @plugin 'tmux-plugins/tpm'                             # TPM plugin manager.
set -g @plugin 'mshkrebtan/base16-tmux'                       # Base16 colour theme support.
set -g @plugin 'tmux-plugins/tmux-pain-control'               # Pane movement/resizing helpers.
set -g @plugin 'tmux-plugins/tmux-sessionist'                 # Session/window helpers.
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'           # Shows prefix/copy-mode state in the status bar.
# }}}

# Plugin configs # {{{
set -g @shell_mode 'vi'                                       # Ask supported plugins to use vi-style shell/editing behaviour.
set -g @prefix_highlight_show_copy_mode 'on'                  # Show prefix-highlight indicator when copy-mode is active.
set -g @prefix_highlight_copy_mode_attr 'fg=black,bg=yellow,bold' # Make the copy-mode indicator obvious.
# }}}

# TPM bootstrap # {{{
run '~/.tmux/plugins/tpm/tpm'                                 # Load TPM and initialise plugins.
# }}}

# Misc options # {{{
set-option -g default-command $SHELL                          # Start panes using your current shell.
set-option -g default-shell $SHELL                            # Use your current shell as tmux's default shell.

set-option -g base-index 1                                    # Number windows from 1.
set-window-option -g pane-base-index 1                        # Number panes from 1.

set -s escape-time 0                                          # Remove Esc delay; helps Vim feel snappier inside tmux.
# }}}

# Automatically set window title # {{{
set-window-option -g automatic-rename on                      # Let tmux rename windows automatically from the active command.
set-option -g set-titles on                                   # Update the outer terminal title.
set-option -g set-titles-string '[#S:#I #h] #W'               # Terminal title format.
# }}}

# Key bindings # {{{
setw -g mode-keys vi                                          # Use vi keys in copy-mode and choice modes.
bind-key -T copy-mode-vi 'v' send -X begin-selection          # In copy-mode, press v to start selecting text.
bind-key -T copy-mode-vi Escape send -X cancel                # In copy-mode, Esc cancels selection/mode.
set-option -g prefix C-a                                      # Use Ctrl-a as the tmux prefix.

bind-key C-a last-window                                      # Prefix + Ctrl-a jumps to the previous window.
bind-key a send-prefix                                        # Prefix + a sends Ctrl-a through to the program in the pane.

# Modern tmux mouse support.
set -g mouse on                                               # Enable tmux mouse handling for pane-aware selection, scroll, and resize.

bind-key m set -g mouse on \; display-message 'Mouse: ON'     # Prefix + m enables mouse support.
bind-key M set -g mouse off \; display-message 'Mouse: OFF'   # Prefix + M disables mouse support.

bind-key Space choose-session                                 # Prefix + Space opens the session chooser.

# Vim-style pane selection.
bind h select-pane -L                                         # Prefix + h moves to the left pane.
bind j select-pane -D                                         # Prefix + j moves to the pane below.
bind k select-pane -U                                         # Prefix + k moves to the pane above.
bind l select-pane -R                                         # Prefix + l moves to the right pane.

# Detect whether current pane is running Vim/Neovim.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L' # Ctrl-h: Vim split left, otherwise tmux pane left.
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D' # Ctrl-j: Vim split down, otherwise tmux pane down.
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U' # Ctrl-k: Vim split up, otherwise tmux pane up.
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R' # Ctrl-l: Vim split right, otherwise tmux pane right.

# Alt-arrow pane switching without prefix.
bind -n M-Left select-pane -L                                 # Alt-Left moves to pane on the left.
bind -n M-Right select-pane -R                                # Alt-Right moves to pane on the right.
bind -n M-Up select-pane -U                                   # Alt-Up moves to pane above.
bind -n M-Down select-pane -D                                 # Alt-Down moves to pane below.

set -s set-clipboard off                                      # Do not let tmux manage the system clipboard directly.

# Copy selected text to clipboard with y in copy-mode, platform-specific.
if-shell -b '[ -z "$WAYLAND_DISPLAY" ] && ! uname | grep -q Darwin' \
    "bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\""

if-shell 'uname | grep -q Darwin' \
    "bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel \"pbcopy\""

if-shell '[ -n "$WAYLAND_DISPLAY" ]' \
    "bind -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel \"wl-copy\""

bind r source-file ~/.tmux.conf \; display-message 'Reloaded ~/.tmux.conf!' # Prefix + r reloads this config.
# }}}

# Window notifications # {{{
setw -g monitor-activity on                                   # Mark windows when activity happens.
set -g visual-activity off                                    # Do not flash visually for activity.
set-option -g focus-events on                                 # Forward focus events to applications that support them.
# }}}

# Terminal colour support # {{{
set -g default-terminal "screen-256color"                     # Advertise a 256-colour terminal inside tmux.
set-option -ga terminal-overrides ',xterm-256color:RGB'       # Enable truecolour/RGB for xterm-256color terminals.
# }}}

# Misc options # {{{
set -g history-limit 100000                                   # Keep a large scrollback history per pane.
set -g allow-passthrough on                                   # Allow passthrough escape sequences where supported.
# }}}

# Status bar / colours # {{{
set -g status 'on'                                            # Enable the status bar.
set -g status-bg colour8                                      # Status bar background colour.
set -g status-fg white                                        # Status bar foreground colour.
set -g status-justify 'left'                                  # Left-align the window list.
set -g status-left-length '100'                               # Max width of left status section.
set -g status-right-length '100'                              # Max width of right status section.
setw -g window-status-separator ''                            # No separator between window entries.

# Your original decorative status bar.
set -g status-left '#{prefix_highlight}#[fg=colour0,bg=colour2,bold] #S #[fg=colour2,bg=colour08,nobold,nounderscore,noitalics]'
set -g status-right '#[fg=colour7,bg=colour8,nobold,nounderscore,noitalics]#[fg=colour0,bg=colour7] %Y-%m-%d │ %H:%M #[fg=colour2,bg=colour7,nobold,nounderscore,noitalics]#[fg=colour0,bg=colour2] #h '
setw -g window-status-format '#[fg=colour7,bg=colour8] #I#F #[fg=colour7,bg=colour8] #W'
setw -g window-status-current-format '#[fg=colour8,bg=colour7,nobold,nounderscore,noitalics]#[fg=colour0,bg=colour7] #I#F #[fg=colour0,bg=colour7] #W #[fg=colour7,bg=colour8,nobold,nounderscore,noitalics]'
# }}}

